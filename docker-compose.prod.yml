services:
  fastapi:
    build: .
    container_name: finance-api
    restart: always
    env_file:
      - .env.prod
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: finance-nginx
    restart: always
    depends_on:
      - fastapi
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
