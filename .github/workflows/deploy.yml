name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preserve production env
        run: |
          if [ -f "${{ secrets.EC2_APP_DIR }}/.env.prod" ]; then
            cp "${{ secrets.EC2_APP_DIR }}/.env.prod" /tmp/finance-env.prod
          fi

      - name: Sync source
        run: |
          mkdir -p "${{ secrets.EC2_APP_DIR }}"
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude '.env.prod' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude 'infra/.terraform' \
            --exclude 'infra/terraform.tfvars' \
            --exclude 'infra/terraform.tfstate*' \
            ./ "${{ secrets.EC2_APP_DIR }}/"
          if [ -f /tmp/finance-env.prod ]; then
            mv /tmp/finance-env.prod "${{ secrets.EC2_APP_DIR }}/.env.prod"
          fi

      - name: Rebuild containers
        working-directory: ${{ secrets.EC2_APP_DIR }}
        run: |
          docker compose -f docker-compose.prod.yml up -d --build
          docker compose -f docker-compose.prod.yml ps
          curl -fsS http://localhost/docs > /dev/null
