name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: sqlite:///./test.db
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: test-secret-key
      DEBUG: "True"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Compile check
        run: python -m compileall app alembic

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: test
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preserve production env
        run: |
          if [ -f "${{ secrets.EC2_APP_DIR }}/.env.prod" ]; then
            cp "${{ secrets.EC2_APP_DIR }}/.env.prod" /tmp/finance-env.prod
          fi

      - name: Sync source
        run: |
          mkdir -p "${{ secrets.EC2_APP_DIR }}"
          rsync -a --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.env' \
            --exclude '.env.prod' \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude 'infra/.terraform' \
            --exclude 'infra/terraform.tfvars' \
            --exclude 'infra/terraform.tfstate*' \
            ./ "${{ secrets.EC2_APP_DIR }}/"
          if [ -f /tmp/finance-env.prod ]; then
            mv /tmp/finance-env.prod "${{ secrets.EC2_APP_DIR }}/.env.prod"
          fi

      - name: Rebuild containers
        working-directory: ${{ secrets.EC2_APP_DIR }}
        run: |
          docker compose -f docker-compose.prod.yml build fastapi
          docker compose -f docker-compose.prod.yml run --rm fastapi alembic upgrade head
          docker compose -f docker-compose.prod.yml up -d
          docker compose -f docker-compose.prod.yml ps
          API_DOMAIN="$(awk -F= '$1 == "API_DOMAIN" {print substr($0, index($0, "=") + 1); exit}' .env.prod | tr -d '"' | tr -d "'")"
          HEALTH_URL="http://localhost/docs"
          CURL_ARGS="-fsS"
          if [ -n "$API_DOMAIN" ] && [ -f "/etc/letsencrypt/live/$API_DOMAIN/fullchain.pem" ]; then
            HEALTH_URL="https://localhost/docs"
            CURL_ARGS="-kfsS"
          fi
          for i in $(seq 1 30); do
            if curl $CURL_ARGS "$HEALTH_URL" > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for app to become healthy ($i/30)"
            sleep 2
          done
          docker compose -f docker-compose.prod.yml logs --tail=100 fastapi
          docker compose -f docker-compose.prod.yml logs --tail=100 nginx
          exit 1

      - name: Prune Docker images
        run: docker image prune -f
